<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>MyPay</title>

    <!-- PWA meta -->
    <meta name="application-name" content="MyPay" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MyPay" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #0f172a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        transition: opacity 0.4s ease;
      }
      #splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #splash .logo {
        width: 72px;
        height: 72px;
        border-radius: 20px;
        background: #1e3a8a;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        font-weight: 800;
        color: white;
        font-family: Inter, sans-serif;
      }
      #splash .name {
        font-size: 24px;
        font-weight: 700;
        color: white;
        font-family: Inter, sans-serif;
        letter-spacing: -0.5px;
      }
      #splash .tagline {
        font-size: 13px;
        color: rgba(255,255,255,0.5);
        font-family: Inter, sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="logo">M</div>
      <div class="name">MyPay</div>
      <div class="tagline">Earn · Save · Transfer</div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.apk.tsx"></script>
  </body>
</html>
