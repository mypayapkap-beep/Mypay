name: Build Android APK

on:
  push:
    branches: [main, master]
    paths:
      - 'client/**'
      - 'lib/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:

  build-release-apk:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build libs
        run: pnpm run typecheck:libs

      - name: Build APK web assets
        working-directory: client
        run: pnpm run build:apk
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Sync Capacitor
        working-directory: client
        run: npx cap sync android

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK (signed release if keystore present, debug otherwise)
        working-directory: client/android
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > app/release.keystore
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=app/release.keystore \
              -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"
          else
            ./gradlew assembleDebug
          fi

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: mypay-release-apk
          path: |
            client/android/app/build/outputs/apk/release/app-release.apk
            client/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
