components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    SuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: string

    # ── Auth schemas ──────────────────────────────────────────
    OtpSendInput:
      type: object
      required: [mobile, purpose]
      properties:
        mobile:
          type: string
        purpose:
          type: string
          enum: [register, login]
        referralCode:
          type: string

    OtpSendResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        otp:
          type: string

    OtpVerifyInput:
      type: object
      required: [mobile, otp, purpose]
      properties:
        mobile:
          type: string
        otp:
          type: string
        purpose:
          type: string
        referralCode:
          type: string

    PasswordLoginInput:
      type: object
      required: [mobile, password]
      properties:
        mobile:
          type: string
        password:
          type: string

    RefreshTokenInput:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    ForgotPasswordInput:
      type: object
      required: [mobile]
      properties:
        mobile:
          type: string

    ResetPasswordInput:
      type: object
      required: [mobile, otp, newPassword]
      properties:
        mobile:
          type: string
        otp:
          type: string
        newPassword:
          type: string

    AuthResult:
      type: object
      properties:
        success:
          type: boolean
        user:
          $ref: "#/components/schemas/UserSummary"
        session:
          $ref: "#/components/schemas/Session"

    Session:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresAt:
          type: ["integer", "null"]

    UserSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        mobile:
          type: string
        referralCode:
          type: string

    MeResult:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserSummary"

    # ── Profile ──────────────────────────────────────────────
    ProfileResult:
      type: object
      properties:
        profile:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            mobile:
              type: string
            referralCode:
              type: string
            profileImageUrl:
              type: ["string", "null"]
            isActive:
              type: boolean
            isSuspended:
              type: boolean
            isBlocked:
              type: boolean
            createdAt:
              type: string

    ProfileUpdate:
      type: object
      properties:
        name:
          type: string
        profileImageUrl:
          type: string

    # ── Wallet ───────────────────────────────────────────────
    WalletBalance:
      type: object
      properties:
        inrBalance:
          type: string
        usdtBalance:
          type: string
        isFrozen:
          type: boolean

    LedgerEntry:
      type: object
      properties:
        id:
          type: string
        currency:
          type: string
        type:
          type: string
        amount:
          type: string
        beforeBalance:
          type: string
        afterBalance:
          type: string
        description:
          type: ["string", "null"]
        createdAt:
          type: string

    LedgerResult:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/LedgerEntry"
        hasMore:
          type: boolean

    TransactionItem:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        currency:
          type: string
        amount:
          type: string
        status:
          type: string
        description:
          type: ["string", "null"]
        createdAt:
          type: string

    TransactionsResult:
      type: object
      properties:
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/TransactionItem"
        hasMore:
          type: boolean

    # ── Deposits ─────────────────────────────────────────────
    DepositItem:
      type: object
      properties:
        id:
          type: string
        amount:
          type: string
        utrNumber:
          type: string
        paymentMethod:
          type: string
        screenshotUrl:
          type: ["string", "null"]
        status:
          type: string
        adminNotes:
          type: ["string", "null"]
        approvedAt:
          type: ["string", "null"]
        createdAt:
          type: string

    DepositsResult:
      type: object
