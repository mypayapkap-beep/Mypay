openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: MyPay fintech API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: profile
  - name: wallet
  - name: deposits
  - name: withdrawals
  - name: upi
  - name: tasks
  - name: referrals
  - name: notifications
  - name: support
  - name: public
  - name: admin

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── AUTH ─────────────────────────────────────────────────────
  /auth/otp/send:
    post:
      operationId: sendOtp
      tags: [auth]
      summary: Send OTP to mobile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpSendInput"
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtpSendResult"

  /auth/otp/verify:
    post:
      operationId: verifyOtp
      tags: [auth]
      summary: Verify OTP and login/register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpVerifyInput"
      responses:
        "200":
          description: Verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"

  /auth/login/password:
    post:
      operationId: loginWithPassword
      tags: [auth]
      summary: Login with mobile + password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordLoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/session/refresh:
    post:
      operationId: refreshSession
      tags: [auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenInput"
      responses:
        "200":
          description: Refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResult"

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Request password reset OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordInput"
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset password with OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInput"
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ── PROFILE ──────────────────────────────────────────────────
  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get own profile
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResult"
    patch:
      operationId: updateProfile
      tags: [profile]
      summary: Update profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResult"

  # ── WALLET ───────────────────────────────────────────────────
  /wallet/balance:
    get:
      operationId: getWalletBalance
      tags: [wallet]
      summary: Get wallet balance
      responses:
        "200":
          description: Wallet balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletBalance"

  /wallet/ledger:
    get:
      operationId: getWalletLedger
      tags: [wallet]
      summary: Get wallet ledger (paginated)
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: before
          in: query
          schema:
            type: string
        - name: currency
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Ledger entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LedgerResult"

  /wallet/transactions:
    get:
      operationId: getTransactions
      tags: [wallet]
      summary: Get transaction history
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: before
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionsResult"

  # ── DEPOSITS ─────────────────────────────────────────────────
  /deposits:
    get:
      operationId: getDeposits
      tags: [deposits]
      summary: List user deposits
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: before
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Deposits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepositsResult"
    post:
      operationId: createDeposit
      tags: [deposits]
      summary: Submit a deposit request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepositInput"
      responses:
        "201":
          description: Deposit created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepositCreated"

  # ── WITHDRAWALS ──────────────────────────────────────────────
  /sell-requests:
    get:
      operationId: getUserSellRequests
      tags: [withdrawals]
      summary: List current user's sell requests
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: before
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Sell requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSellRequestsResult"

  /withdrawals:
    get:
      operationId: getWithdrawals
      tags: [withdrawals]
      summary: List user withdrawals
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: before
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Withdrawals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WithdrawalsResult"
    post:
      operationId: createWithdrawal
      tags: [withdrawals]
      summary: Request a withdrawal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawalInput"
      responses:
        "201":
          description: Withdrawal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WithdrawalCreated"

  # ── UPI ──────────────────────────────────────────────────────
  /upi:
    get:
      operationId: getUpiAccounts
      tags: [upi]
      summary: List user UPI accounts
      responses:
        "200":
          description: UPI accounts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpiAccountsResult"
    post:
      operationId: addUpiAccount
      tags: [upi]
      summary: Add a UPI account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpiAccountInput"
      responses:
        "201":
          description: Account added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpiAccountCreated"

  /upi/{id}/set-default:
    patch:
      operationId: setDefaultUpiAccount
      tags: [upi]
      summary: Set UPI account as default
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Default set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /upi/{id}:
    delete:
      operationId: deleteUpiAccount
      tags: [upi]
      summary: Delete a UPI account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ── TASKS ────────────────────────────────────────────────────
  /tasks:
    get:
      operationId: getTasks
      tags: [tasks]
      summary: Browse available tasks
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: before
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Tasks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TasksResult"

  /tasks/{id}/submit:
    post:
      operationId: submitTask
      tags: [tasks]
      summary: Submit task proof
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskSubmissionInput"
      responses:
        "201":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /tasks/submissions:
    get:
      operationId: getMyTaskSubmissions
      tags: [tasks]
      summary: Get own task submissions
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: before
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Submissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskSubmissionsResult"

  # ── REFERRALS ────────────────────────────────────────────────
  /referrals/stats:
    get:
      operationId: getReferralStats
      tags: [referrals]
      summary: Get referral stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralStats"

  /referrals/tree:
    get:
      operationId: getReferralTree
      tags: [referrals]
      summary: Get referral tree
      responses:
        "200":
          description: Referral tree
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralTree"

  # ── NOTIFICATIONS ────────────────────────────────────────────
  /notifications:
    get:
      operationId: getNotifications
      tags: [notifications]
      summary: List notifications
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: before
          in: query
          schema:
            type: string
        - name: unread
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationsResult"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /notifications/read-all:
    patch:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: All marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ── SUPPORT ──────────────────────────────────────────────────
  /support:
    get:
      operationId: getSupportTickets
      tags: [support]
      summary: List own support tickets
      responses:
        "200":
          description: Tickets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicketsResult"
    post:
      operationId: createSupportTicket
      tags: [support]
      summary: Open a support ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupportTicketInput"
      responses:
        "201":
          description: Ticket created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicketCreated"

  # ── PUBLIC ───────────────────────────────────────────────────
  /public/banners:
    get:
      operationId: getPublicBanners
      tags: [public]
      summary: Get active banners
      responses:
        "200":
          description: Banners
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BannersResult"

  /public/announcements:
    get:
      operationId: getPublicAnnouncements
      tags: [public]
      summary: Get active announcements
      responses:
        "200":
          description: Announcements
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnnouncementsResult"

  /public/settings:
    get:
      operationId: getPublicSettings
      tags: [public]
      summary: Get public settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicSettingsResult"

  # ── ADMIN AUTH ───────────────────────────────────────────────
  /admin/auth/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login with email + password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAuthResult"

  /admin/auth/logout:
    post:
      operationId: adminLogout
      tags: [admin]
      summary: Admin logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/auth/me:
    get:
      operationId: getAdminMe
      tags: [admin]
      summary: Get current admin info
      responses:
        "200":
          description: Admin info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMeResult"

  /admin/auth/create:
    post:
      operationId: createAdmin
      tags: [admin]
      summary: Create admin user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCreateInput"
      responses:
        "201":
          description: Admin created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMeResult"

  # ── ADMIN DASHBOARD ──────────────────────────────────────────
  /admin/dashboard:
    get:
      operationId: getAdminDashboard
      tags: [admin]
      summary: Admin dashboard stats
      responses:
        "200":
          description: Dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboard"

  # ── ADMIN USERS ──────────────────────────────────────────────
  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: List all users
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: before
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUsersResult"

  /admin/users/{id}:
    get:
      operationId: adminGetUser
      tags: [admin]
      summary: Get full user profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserDetail"

  /admin/users/{id}/suspend:
    patch:
      operationId: adminSuspendUser
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonInput"
      responses:
        "200":
          description: Suspended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/users/{id}/unsuspend:
    patch:
      operationId: adminUnsuspendUser
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Unsuspended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/users/{id}/block:
    patch:
      operationId: adminBlockUser
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonInput"
      responses:
        "200":
          description: Blocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/users/{id}/unblock:
    patch:
      operationId: adminUnblockUser
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Unblocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/users/{id}/wallet/freeze:
    patch:
      operationId: adminFreezeWallet
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonInput"
      responses:
        "200":
          description: Frozen
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/users/{id}/wallet/unfreeze:
    patch:
      operationId: adminUnfreezeWallet
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Unfrozen
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ── ADMIN DEPOSITS ───────────────────────────────────────────
  /admin/deposits:
    get:
      operationId: adminListDeposits
      tags: [admin]
      summary: List all deposits
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: before
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Deposits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDepositsResult"

  /admin/deposits/{id}/approve:
    patch:
      operationId: adminApproveDeposit
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminNotesInput"
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/deposits/{id}/reject:
    patch:
      operationId: adminRejectDeposit
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonInput"
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ── ADMIN WITHDRAWALS ────────────────────────────────────────
  /admin/withdrawals:
    get:
      operationId: adminListWithdrawals
      tags: [admin]
      summary: List all withdrawals
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: before
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Withdrawals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminWithdrawalsResult"

  /admin/withdrawals/{id}/process:
    patch:
      operationId: adminProcessWithdrawal
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminNotesInput"
      responses:
        "200":
          description: Processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/withdrawals/{id}/reject:
    patch:
      operationId: adminRejectWithdrawal
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReasonInput"
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ── ADMIN SELL REQUESTS ──────────────────────────────────────
  /admin/sell-requests:
    post:
      operationId: adminCreateSellRequest
      tags: [admin]
      summary: Create a sell request for a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminSellRequestInput"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
    get:
      operationId: adminListSellRequests
      tags: [admin]
      summary: List all sell requests
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: before
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Sell requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSellRequestsResult"

  /admin/sell-requests/{id}/approve:
    patch:
